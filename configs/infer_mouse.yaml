data:
  mouse_lr_x2_dir: "./data/mouse/test/down_2x_bilinear"
  mouse_hr_x2_dir: "./data/mouse/test/raw"
  mouse_lr_x4_dir: "./data/mouse/test/down_4x_bilinear"
  mouse_hr_x4_dir: "./data/mouse/test/raw"
  mouse_mask_dir: null

inference:
  checkpoint_x2: "./experiments/steered_diffusion/x2/checkpoints/best_x2.pt"
  checkpoint_x4: "./experiments/steered_diffusion/x4/checkpoints/best_x4.pt"
  scale: 2
  guidance_scale: 1.2
  omega: 3.0
  sampling_steps: 50
  data_consistency_weight: 1.0
  init_mode: "lr_noise"
  noise_strength: 0.25
  anchor_weight: 0.35
  residual_scale: 0.55
  residual_clip: 0.15
  bicubic_blend: 0.15
  self_ensemble: false
  gate_config:
    threshold: 0.15
    temperature: 0.05
    kernel_size: 3
    sigma: 1.0
  save_nifti: false
  save_png: true
  save_npy: true

evaluation:
  use_mask: true
  compute_ssim_psnr: true
  compute_vdp_vhi: true

vdp_vhi:
  defect_threshold_mode: "relative_to_mean"
  defect_relative_threshold: 0.6
  defect_percentile: 15
  fixed_threshold: 0.1
  vhi_formula: "std_over_mean"

model:
  in_channels: 1
  base_channels: 64
  channel_mults: [1, 2, 4]
  num_res_blocks: 2
  time_dim: 256
  scale_dim: 32

diffusion:
  timesteps: 1000
  beta_schedule: "linear"

output:
  sr_dir: "./experiments/steered_diffusion"
  metric_dir: "./experiments/steered_diffusion/metrics"
  figure_dir: "./experiments/steered_diffusion/figures"
